name: Release Punter

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to set as stable (e.g., v1.2.3). Defaults to the latest published release."
        required: false
        type: string

# Prevent concurrent runs that could produce conflicting commits
concurrency:
  group: update-stable-release
  cancel-in-progress: false

jobs:
  update-stable:
    name: Release Punter
    runs-on: ubuntu-latest
    # Never run on forks — they cannot push to the upstream repository
    if: ${{ !github.event.repository.fork }}
    permissions:
      contents: write

    steps:
      - name: Validate actor permissions
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const role = data.role_name;
            core.info(`Actor ${context.actor} has role: ${role}`);
            if (role !== 'admin' && role !== 'maintain') {
              core.setFailed(
                `❌ ${context.actor} must be a repository admin or maintainer to update the stable release (current role: ${role})`
              );
            } else {
              core.info(`✅ ${context.actor} is authorized (role: ${role})`);
            }

      - name: Resolve version
        id: version
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          INPUT_VERSION: ${{ inputs.version }}
        with:
          script: |
            let version = (process.env.INPUT_VERSION || '').trim();
            if (!version) {
              const { data: release } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              version = release.tag_name;
              core.info(`ℹ️ No version specified, resolved to latest: ${version}`);
            }
            core.setOutput('version', version);

      - name: Validate release tag
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const version = process.env.RELEASE_VERSION;

            // Only exact vMAJOR.MINOR.PATCH versions are valid for the stable alias
            // (pre-release suffixes such as -beta.1 are intentionally rejected)
            if (!/^v\d+\.\d+\.\d+$/.test(version)) {
              core.setFailed(
                `❌ Invalid version format: "${version}". Expected vMAJOR.MINOR.PATCH (e.g., v1.2.3). ` +
                `Pre-release versions cannot be set as stable.`
              );
              return;
            }

            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version,
              }));
            } catch (err) {
              core.setFailed(`❌ No published release found for tag ${version}: ${err.message}`);
              return;
            }

            if (release.draft) {
              core.setFailed(`❌ ${version} is a draft release and cannot be set as stable`);
              return;
            }

            if (release.prerelease) {
              core.warning(`⚠️ ${version} is marked as a pre-release`);
            }

            core.info(`✅ Validated: ${version} is a published release`);

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update stable alias in releases.json
        id: update
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          FILE=".github/aw/releases.json"

          CURRENT=$(jq -r '.aliases.stable // ""' "$FILE")

          if [ -z "$CURRENT" ]; then
            echo "ℹ️ No existing stable alias found; will create one."
          fi

          if [ "$CURRENT" = "$VERSION" ]; then
            echo "ℹ️ stable is already set to $VERSION — no change needed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Updating stable alias: $CURRENT → $VERSION"
            jq --arg v "$VERSION" '.aliases.stable = $v' "$FILE" > /tmp/releases.json
            mv /tmp/releases.json "$FILE"
            echo "✅ Updated $FILE"
            cat "$FILE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate releases.json
        if: steps.update.outputs.changed == 'true'
        run: |
          FILE=".github/aw/releases.json"
          if ! jq empty "$FILE" 2>&1; then
            echo "❌ $FILE is not valid JSON after update"
            exit 1
          fi
          echo "✅ $FILE is valid JSON"

      - name: Commit and push
        if: steps.update.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/aw/releases.json
          git commit -m "chore: update stable release to $VERSION"
          git push
